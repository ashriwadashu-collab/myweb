<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      width: 90%;
      max-width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: auto;
    }

    .card-content {
      padding: 15px;
    }

    .title {
      font-weight: bold;
      font-size: 18px;
    }

    .subtitle {
      color: #555;
      margin: 5px 0 10px;
    }

    .rating {
      color: orange;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .deal {
      background: red;
      color: white;
      padding: 5px;
      display: inline-block;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
    }

    .old-price {
      text-decoration: line-through;
      color: #888;
      font-size: 14px;
    }

    .discount {
      color: green;
      font-size: 14px;
      margin-top: 5px;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .card {
        max-width: 350px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="images/ha1.jpg" alt="Luggage">
    
    <div class="card-content">
      <div class="title">THE ASSEMBLY</div>
      <div class="subtitle">Assembly Luggage Trolley Set</div>
      
      <div class="rating">⭐⭐⭐⭐⭐ (13)</div>
      
      <div class="deal">Limited time deal</div>
      
      <div class="price">₹15,999</div>
      <div class="old-price">₹26,199</div>
      
      <div class="discount">Save 2% with coupon</div>
    </div>
  </div>

</body>
</html>
