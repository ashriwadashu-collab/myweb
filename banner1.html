<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>



<style>


   @keyframes runtext
   {
       from{left:-500px;}
       to{left:1400px;}
    }




@keyframes changepic
{
10%{background-image: url(images/fa1.jpg)}
20%{background-image: url(images/fa2.jpg)}
30%{background-image: url(images/fa3.jpg)}
40%{background-image: url(images/fa4.jpg)}
50%{background-image: url(images/fa5.jpg)}
60%{background-image: url(images/fa6.jpg)}
70%{background-image: url(images/fa7.jpg)}
80%{background-image: url(images/fa8.jpg)}
90%{background-image: url(images/fa9.jpg)}
100%{background-image: url(images/fa10.jpg)}
}
  @keyframes mycolor
         {
            10%{color:orange;}
            10%{color:lavender;}
            10%{color:yellow;}
            10%{color:cyan;}

         }


  header
{
background:black;
background-image:url(images/fa1.jpg);
background-repeat:no-repeat;
background-size:100% 100%;
height:600px;
colour:white;
width:50%;
margin:auto;
overflow:hidden;
animation:changepic 12s linear infinite;


#text
{
margin-top:5px;
padding-top:30px;
font-family:arial black;
font-size:50px;
color:red;
text-shadow:5px 5px 5px black;
text-transform:uppercase;
//background:yellow;
position:relative;
left:-500px;
top:100px;
animation:runtext 12s linear infinite alternate ,mycolor 2s infinite;
}


</style>
<body>
<header>
        <div id="text" >welcome to nature care</div>
</header>
</body>
</html>
